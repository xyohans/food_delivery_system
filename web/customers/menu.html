<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            
            body {
                font-family: Arial, sans-serif;
                background-color: #f5f5f5;
            }

            .menus {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
                padding: 20px;
            }

            .menus div {
                background: white;
                padding: 15px;
                border-radius: 8px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }

            .menus p {
                margin: 5px 0;
            }

            .menus span {
                font-weight: bold;
                color: green;
            }

            button {
                margin-top: 10px;
                padding: 8px;
                border: none;
                background-color: #007bff;
                color: white;
                border-radius: 5px;
                cursor: pointer;
            }

            button:hover {
                background-color: #0056b3;
            }

        </style>
    </head>
    
    <body>
        <div class="filter"></div>
        <div class="menus">
        </div>
        
        <script>
            const menus = document.querySelector('.menus');
            const filtersContainer = document.querySelector('.filter');
            

            function fileterItems(data){
                const catagories = [...new Set(data.map(item => item.categoryName))];
                catagories.forEach(cat => {
                    const label = document.createElement("label");

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.value = cat;

                    label.appendChild(checkbox);
                    label.append(" " + cat);

                    filtersContainer.appendChild(label);

                
            });
            console.log(catagories);
        }
            async function fetchMenus(){
                
                try{
                    const res = await fetch('http://localhost:8084/food_delivery/MenuServlet');
                    const data = await res.json();
                    
                    fileterItems(data);
                    
                    data.forEach(item => { 
                        
                        
                        const container = document.createElement("div");

                        const name = document.createElement("p");
                        name.textContent = item.name;

                        const price = document.createElement("span");
                        price.textContent = item.price;

                        const desc = document.createElement("p");
                        desc.textContent = item.description;

                        const btn = document.createElement("button");
                        btn.textContent = "add order";


                        

                        container.appendChild(name);
                        container.appendChild(price);
                        container.appendChild(desc);
                        container.appendChild(btn);
                        
                        
                        menus.appendChild(container);
                        
                });
//                console.log(data);
            }
                catch(err){
                    console.log(err);
                }
                
            }
            
            fetchMenus();
        </script>
    </body>
</html>
